// 切换单个险种选择
function toggleCategory(category, checkbox) {
    event.stopPropagation();
    
    const allCheckbox = document.getElementById('categoryAll');
    
    if (checkbox.checked) {
        // 选中具体险种，取消"全部"
        allCheckbox.checked = false;
        selectedCategories = selectedCategories.filter(c => c !== 'all');
        
        if (!selectedCategories.includes(category)) {
            selectedCategories.push(category);
        }
    } else {
        // 取消选中该险种
        selectedCategories = selectedCategories.filter(c => c !== category);
        
        // 如果没有选中任何具体险种，自动回到"全部"
        if (selectedCategories.length === 0) {
            selectedCategories = ['all'];
            allCheckbox.checked = true;
            // 取消所有具体险种的勾选
            document.querySelectorAll('.category-option-checkbox').forEach(cb => {
                cb.checked = false;
            });
        }
    }
    
    updateCategorySelectedText();
    updateChart();
    updateTable();
    updateStatsCards();
}

// 从数据中获取最新日期作为密码
function getPasswordFromData() {
    // 从内嵌数据中获取所有日期
    const allDates = [];
    if (EMBEDDED_DATA && EMBEDDED_DATA.metadata) {
        if (EMBEDDED_DATA.metadata.dates_2025) {
            allDates.push(...EMBEDDED_DATA.metadata.dates_2025);
        }
        if (EMBEDDED_DATA.metadata.dates_2026) {
            allDates.push(...EMBEDDED_DATA.metadata.dates_2026);
        }
    }
    
    if (allDates.length === 0) {
        return '20260304'; // 默认密码
    }
    
    // 排序获取最新日期
    allDates.sort();
    const latestDate = allDates[allDates.length - 1]; // 格式: 2026-03-04
    
    // 转换为密码格式: 20260304
    return latestDate.replace(/-/g, '');
}

// ============================================
// 计算筛选后的保费（按日期）- 返回万元单位
// ============================================
function calculateFilteredPremium(year, date) {
    const institutionFilter = document.getElementById('institutionSelect').value;
    
    const dateData = detailData[year][date];
    if (!dateData || !dateData.records) return 0;
    
    const totalYuan = dateData.records
        .filter(r => {
            // 险种筛选：如果选了'all'，或者选中的数组包含该险种
            if (selectedCategories.includes('all')) return true;
            return selectedCategories.includes(r.category);
        })
        .filter(r => institutionFilter === 'all' || r.institution === institutionFilter)
        .reduce((sum, r) => sum + (parseFloat(r.premium) || 0), 0);
    
    // 转换为万元，保留两位小数
    return Math.round(totalYuan / 10000 * 100) / 100;
}

// ============================================
// 更新统计卡片 - 显示最新日期的累计值（不要累加不同日期）
// ============================================
function updateStatsCards() {
    // 获取最新日期
    const dates2025 = Object.keys(detailData[2025]).sort();
    const dates2026 = Object.keys(detailData[2026]).sort();
    
    const latestDate2025 = dates2025[dates2025.length - 1];
    const latestDate2026 = dates2026[dates2026.length - 1];
    
    // 获取最新日期的累计保费（不要累加不同日期）
    const total2025 = latestDate2025 ? calculateFilteredPremium(2025, latestDate2025) : 0;
    const total2026 = latestDate2026 ? calculateFilteredPremium(2026, latestDate2026) : 0;
    
    // 计算增长率
    const growthRate = total2025 > 0 ? ((total2026 - total2025) / total2025 * 100) : 0;
    const growthSign = growthRate >= 0 ? '+' : '';
    const growthColor = growthRate >= 0 ? '#28a745' : '#dc3545';
    
    // 更新显示（万元单位）
    document.getElementById('total2025').innerHTML = formatNumber(total2025) + '<small style="font-size:14px;margin-left:4px;">万元</small>';
    document.getElementById('count2025').textContent = '最新: ' + (latestDate2025 || '-');
    
    document.getElementById('total2026').innerHTML = formatNumber(total2026) + '<small style="font-size:14px;margin-left:4px;">万元</small>';
    document.getElementById('count2026').textContent = '最新: ' + (latestDate2026 || '-');
    
    const growthEl = document.getElementById('growthRate');
    growthEl.textContent = growthSign + (parseFloat(growthRate) || 0).toFixed(2) + '%';
    growthEl.style.color = growthRate >= 0 ? '#28a745' : '#dc3545';
    
    // 统计同比正增/负增机构数（排除指定机构）
    const excludedInstitutions = [
        '(01100019) 泰安续保业务部',
        '(01100003) 直销业务一部'
    ];
    
    let positiveGrowth = 0;
    let negativeGrowth = 0;
    
    if (latestDate2025 && latestDate2026) {
        const dateData2025 = detailData[2025][latestDate2025];
        const dateData2026 = detailData[2026][latestDate2026];
        
        if (dateData2025 && dateData2025.records && dateData2026 && dateData2026.records) {
            // 获取所有机构（排除指定机构）
            const allInsts = [...new Set([
                ...dateData2025.records.map(r => r.institution),
                ...dateData2026.records.map(r => r.institution)
            ])].filter(inst => !excludedInstitutions.includes(inst));
            
            allInsts.forEach(inst => {
                // 根据当前险种筛选条件计算该机构的保费
                const val2025 = dateData2025.records
                    .filter(r => r.institution === inst)
                    .filter(r => selectedCategories.includes('all') || selectedCategories.includes(r.category))
                    .reduce((sum, r) => sum + (parseFloat(r.premium) || 0), 0);
                
                const val2026 = dateData2026.records
                    .filter(r => r.institution === inst)
                    .filter(r => selectedCategories.includes('all') || selectedCategories.includes(r.category))
                    .reduce((sum, r) => sum + (parseFloat(r.premium) || 0), 0);
                
                // 只统计有数据的机构
                if (val2025 > 0 || val2026 > 0) {
                    if (val2026 > val2025) {
                        positiveGrowth++;
                    } else if (val2026 < val2025) {
                        negativeGrowth++;
                    }
                    // 相等时不统计
                }
            });
        }
    }
    
    document.getElementById('dateRange').innerHTML = 
        '同比正增机构：<span style="color:#28a745;font-weight:bold;">' + positiveGrowth + '</span>个<br>' +
        '同比负增机构：<span style="color:#dc3545;font-weight:bold;">' + negativeGrowth + '</span>个';
}

// ============================================
// 计算预算进度（全年2400万任务）
// ============================================
function calculateBudgetProgress(dateStr, yearlyTarget) {
    // dateStr格式: 2026-03-04
    const year = parseInt(dateStr.substring(0, 4));
    const month = parseInt(dateStr.substring(5, 7));
    const day = parseInt(dateStr.substring(8, 10));
    
    // 计算当年1月1日到该日期的天数
    const startOfYear = new Date(year, 0, 1);
    const currentDate = new Date(year, month - 1, day);
    const dayOfYear = Math.floor((currentDate - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
    
    // 预算进度 = 年目标 / 365 * 已过天数
    return (yearlyTarget / 365 * dayOfYear);
}

// ============================================
// 更新数据表格 - 只显示最新日期的数据（不要累加不同日期）
// ============================================
function updateTable() {
    const institutionFilter = document.getElementById('institutionSelect').value;
    const container = document.getElementById('tableContainer');
    
    // 获取最新日期
    const dates2025 = Object.keys(detailData[2025]).sort();
    const dates2026 = Object.keys(detailData[2026]).sort();
    const latestDate2025 = dates2025[dates2025.length - 1];
    const latestDate2026 = dates2026[dates2026.length - 1];
    
    // 判断险种是否匹配
    function categoryMatch(category) {
        if (selectedCategories.includes('all')) return true;
        return selectedCategories.includes(category);
    }
    
    // 只汇总最新日期的数据（不要累加不同日期）
    const summaryMap = new Map();
    
    // 只处理2025年最新日期的数据
    if (latestDate2025 && detailData[2025][latestDate2025]) {
        const dateData = detailData[2025][latestDate2025];
        if (dateData.records) {
            dateData.records.forEach(record => {
                if (!categoryMatch(record.category)) return;
                if (institutionFilter !== 'all' && record.institution !== institutionFilter) return;
                
                const key = record.category + '|' + record.institution;
                if (!summaryMap.has(key)) {
                    summaryMap.set(key, {
                        category: record.category,
                        institution: record.institution,
                        y2025: 0,
                        y2026: 0
                    });
                }
                summaryMap.get(key).y2025 += (parseFloat(record.premium) || 0);
            });
        }
    }
    
    // 只处理2026年最新日期的数据
    if (latestDate2026 && detailData[2026][latestDate2026]) {
        const dateData = detailData[2026][latestDate2026];
        if (dateData.records) {
            dateData.records.forEach(record => {
                if (!categoryMatch(record.category)) return;
                if (institutionFilter !== 'all' && record.institution !== institutionFilter) return;
                
                const key = record.category + '|' + record.institution;
                if (!summaryMap.has(key)) {
                    summaryMap.set(key, {
                        category: record.category,
                        institution: record.institution,
                        y2025: 0,
                        y2026: 0
                    });
                }
                summaryMap.get(key).y2026 += (parseFloat(record.premium) || 0);
            });
        }
    }
    
    // 转换为数组并按同比增长率排序（由高到低）
    const summaryArray = Array.from(summaryMap.values())
        .sort((a, b) => {
            const growthA = a.y2025 > 0 ? ((a.y2026 - a.y2025) / a.y2025 * 100) : (a.y2026 > 0 ? 100 : 0);
            const growthB = b.y2025 > 0 ? ((b.y2026 - b.y2025) / b.y2025 * 100) : (b.y2026 > 0 ? 100 : 0);
            return growthB - growthA;  // 由高到低
        });

    if (summaryArray.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <p>没有找到符合条件的数据</p>
            </div>
        `;
        return;
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>四级机构</th>
                    <th>险种大类</th>
                    <th style="text-align: right">2025年(万元)</th>
                    <th style="text-align: right">2026年(万元)</th>
                    <th style="text-align: right">同比增长</th>
                </tr>
            </thead>
            <tbody>
    `;

    summaryArray.forEach(item => {
        const growth = item.y2025 > 0 ? ((item.y2026 - item.y2025) / item.y2025 * 100) : (item.y2026 > 0 ? 100 : 0);
        const growthSign = growth >= 0 ? '+' : '';
        const growthColor = growth >= 0 ? '#28a745' : '#dc3545';
        
        // 转换为万元
        const y2025Wan = ((parseFloat(item.y2025) || 0) / 10000).toFixed(2);
        const y2026Wan = ((parseFloat(item.y2026) || 0) / 10000).toFixed(2);
        
        html += `
            <tr>
                <td>${item.institution}</td>
                <td>${item.category}</td>
                <td style="text-align: right;">${y2025Wan} <small>万</small></td>
                <td style="text-align: right; font-weight: 600; color: #667eea;">${y2026Wan} <small>万</small></td>
                <td style="text-align: right; font-weight: 600; color: ${growthColor};">
                    ${growthSign}${(parseFloat(growth) || 0).toFixed(2)}%
                </td>
            </tr>
        `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}

// ============================================
// 格式化数字
// ============================================
function formatNumber(num) {
    return num.toLocaleString('zh-CN', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

// ============================================
// 监听筛选器变化
// ============================================
document.getElementById('institutionSelect').addEventListener('change', function() {
    updateChart();
    updateTable();
    updateStatsCards();
});
</script>
